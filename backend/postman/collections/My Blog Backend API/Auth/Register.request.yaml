$kind: http-request
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "user@example.com",
      "password": "secret123",
      "name": "Jane Doe",
      "username": "janedoe"
    }
